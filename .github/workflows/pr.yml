name: PR Pipeline (Golden Path)
'on':
  pull_request:
    branches:
      - main
jobs:
  work-id-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history for commit walking)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate Work ID in branch name
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
          WORK_ID_PATTERN: '[A-Z][A-Z0-9]*-d+'
        run: |-
          if ! echo "$BRANCH" | grep -qE "$WORK_ID_PATTERN"; then
            echo "::error::Branch '$BRANCH' is missing a Work ID matching pattern: $WORK_ID_PATTERN"
            exit 1
          fi
          echo "Branch '$BRANCH' has Work ID"
      - name: Validate Work ID in PR commits
        if: github.event_name == 'pull_request'
        env:
          WORK_ID_PATTERN: '[A-Z][A-Z0-9]*-d+'
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: >-
          BAD=$(git log --format="%H %s" "$BASE_SHA..$HEAD_SHA" | grep -vE
          "$WORK_ID_PATTERN" || true)

          if [ -n "$BAD" ]; then
            echo "::error::Commits missing Work ID matching $WORK_ID_PATTERN:"
            echo "$BAD"
            exit 1
          fi

          echo "All commits have Work ID"
      - name: Validate Work ID in PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          WORK_ID_PATTERN: '[A-Z][A-Z0-9]*-d+'
        run: |-
          if ! echo "$PR_TITLE" | grep -qE "$WORK_ID_PATTERN"; then
            echo "::error::PR title is missing Work ID matching: $WORK_ID_PATTERN"
            echo "Title: $PR_TITLE"
            exit 1
          fi
          echo "PR title has Work ID"
  small-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install Python dependencies (uv)
        working-directory: src/python
        run: uv sync --frozen
      - name: Run lint
        run: ruff check src/python && ruff format --check src/python
      - name: Run tests
        env:
          PYTHONPATH: src/python
        run: pytest --cov=src/python --cov-report=xml --cov-fail-under=80
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-transactionify
          path: coverage.xml
          retention-days: 7
    needs:
      - work-id-validation
  contract-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install openapi-spec-validator
        run: pip install --quiet openapi-spec-validator>=0.7
      - name: Validate OpenAPI spec
        run: openapi-spec-validator openapi.yaml
      - name: Upload OpenAPI spec for review
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openapi-transactionify
          path: openapi.yaml
          retention-days: 7
    needs:
      - work-id-validation
  cdk-synth:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: 'false'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run cdk synth
        env:
          AWS_REGION: us-east-1
        run: pnpm cdk synth
      - name: Upload CloudFormation template
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cdk-template-transactionify
          path: cdk.out/*.template.json
          retention-days: 7
    needs:
      - small-tests
      - contract-validation
  dora-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: always()
    steps:
      - name: Compose and emit DoraEvent
        env:
          PIPELINE_STATUS: >-
            ${{ contains(needs.*.result, 'failure') && 'failure' ||
            (contains(needs.*.result, 'cancelled') && 'cancelled' || 'success')
            }}
          WORK_ID_PATTERN: '[A-Z][A-Z0-9]*-d+'
          TEAM: transactionify
          REPO: ${{ github.server_url }}/${{ github.repository }}
          ACTOR: ${{ github.actor }}
          GIT_SHA: ${{ github.sha }}
          FRAMEWORK_VERSION: 0.1.0
          SUBJECT: >-
            ${{ github.event.pull_request.title || github.head_ref ||
            github.ref_name }}
        run: >-
          WORK_ID=$(echo "$SUBJECT" | grep -oE "$WORK_ID_PATTERN" | head -1 ||
          echo "UNKNOWN")

          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          REASON_FIELD="null"

          if [ "$PIPELINE_STATUS" != "success" ]; then
            REASON_FIELD="\"pipeline reported $PIPELINE_STATUS via needs.*.result\""
          fi


          EVENT=$(cat <<EOF

          {
            "schema_version": "1.0",
            "work_id": "$WORK_ID",
            "team": "$TEAM",
            "repo": "$REPO",
            "stage": "dora-summary",
            "status": "$PIPELINE_STATUS",
            "actor": "$ACTOR",
            "timestamp": "$TIMESTAMP",
            "duration_ms": null,
            "git_sha": "$GIT_SHA",
            "framework_version": "$FRAMEWORK_VERSION",
            "reason": $REASON_FIELD
          }

          EOF

          )


          echo "::group::DORA event"

          echo "$EVENT"

          echo "::endgroup::"


          # Surface the event as a workflow output so downstream jobs / org-wide

          # DORA collectors can pick it up. In production, replace this echo

          # with a POST to your collector endpoint:

          #   curl -fsS -X POST "$DORA_COLLECTOR_URL" \

          #        -H "Content-Type: application/json" -d "$EVENT"

          echo "$EVENT" > dora-event.json
      - name: Upload DoraEvent artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dora-event-transactionify
          path: dora-event.json
          retention-days: 30
    needs:
      - work-id-validation
      - small-tests
      - contract-validation
      - cdk-synth
