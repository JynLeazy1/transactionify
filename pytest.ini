[pytest]
testpaths = test/unit/src/python
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Two pythonpath entries: repo root lets tests import as
# `src.python.transactionify...` (legacy 4-level style); `src/python` lets the
# source code's internal `from transactionify.tools.aws...` imports resolve.
pythonpath = . src/python
# `importmode = importlib` removes the need for __init__.py in every test
# subdir AND handles same-basename test files (multiple `test_main.py`) cleanly.
addopts = -v --strict-markers --import-mode=importlib
markers =
    unit: Unit tests
    integration: Integration tests
